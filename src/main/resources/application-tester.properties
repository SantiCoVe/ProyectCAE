# ============================================
# Perfil: TESTER ? H2 en memoria
# ============================================

# Datasource (H2 en memoria)
spring.datasource.url=jdbc:h2:mem:archiveflow_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 (util para inspeccionar datos durante tests)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger deshabilitado en tester
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logs reducidos
logging.level.org.hibernate.SQL=WARN
logging.level.com.tuempresa.gestor=INFO

# Errores detallados
server.error.include-message=always
server.error.include-binding-errors=always